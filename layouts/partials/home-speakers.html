{{ $speakers := where .Site.Pages "Type" "speaker" }}
{{ with $speakers }}
<section id="speakers" class="pin-wrapper bs-texture-dots">
    <div class="content">
        <div class="block-heading pin-element">
            <h2>{{T "speakers_title"}}</h2>
            <h3 class="heading-square">{{T "speakers_subtitle"}}</h3>
        </div>

        <div class="speakers-list">
            {{ range . }}
            {{ partial "speaker-grid-card.html" .}}
            {{end}}
        </div>
    </div>
</section>
{{ end }}
